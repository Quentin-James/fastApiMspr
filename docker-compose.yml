services:
  # ─── Microservice IA ────────────────────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mspr-ia
    restart: unless-stopped
    ports:
      - "8085:8085"
    env_file:
      - .env
    networks:
      - mspr-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8085/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  mspr-network:
    driver: bridge
